<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Coin Flip — Maimon's Games</title>
  <script src="../../i18n.js"></script>
  <script src="../../theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f0f13; --surface:#1a1a24; --border:#2a2a38; --accent:#7c6ff7; --text:#e8e8f0; --muted:#7a7a96; }
    [data-theme="light"] { --bg:#f4f4f8; --surface:#ffffff; --border:#dddde8; --accent:#5b4fd4; --text:#1a1a2e; --muted:#6a6a86; }
    body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif;
      display:flex; flex-direction:column; align-items:center; min-height:100dvh;
      padding:1rem; gap:1rem; transition:background 0.2s,color 0.2s; }
    nav { align-self:flex-start; display:flex; gap:1rem; align-items:center; }
    nav a { color:var(--muted); text-decoration:none; font-size:0.9rem; }
    nav a:hover { color:var(--text); }
    h1 { font-size:1.2rem; font-weight:600; }
    .controls { display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap; justify-content:center; }
    button { background:var(--surface); color:var(--text); border:1px solid var(--border);
      border-radius:8px; padding:0.5rem 1.2rem; font-size:0.9rem; cursor:pointer;
      -webkit-tap-highlight-color:transparent; }
    button:hover { border-color:var(--accent); }
    button:active { opacity:0.8; }
    .theme-btn, .lang-btn { color:var(--muted); padding:0.35rem 0.9rem; font-size:0.8rem; }
    #status { color:var(--text); font-size:1.4rem; font-weight:800; min-height:1.4em; text-align:center; }
    .hint { color:var(--muted); font-size:0.75rem; text-align:center; }
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;max-width:360px;width:100%;position:relative;max-height:90vh;overflow-y:auto;}
    .modal-close{position:absolute;top:.75rem;right:.75rem;background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;line-height:1;padding:0;}
    .modal-close:hover{color:var(--text);}
    .modal-title{font-size:1.05rem;font-weight:700;margin-bottom:1rem;}
    .modal-steps{padding-inline-start:1.2rem;display:flex;flex-direction:column;gap:.65rem;font-size:.88rem;line-height:1.5;}

    #canvas { cursor:pointer; max-width:100%; }
    #tally {
      font-size: 0.9rem; color: var(--muted); text-align: center;
      display: flex; gap: 1.5rem;
    }
    #tally span { display:flex; flex-direction:column; align-items:center; gap:0.2rem; }
    #tally strong { color: var(--text); font-size: 1.5rem; font-weight: 800; }
  </style>
</head>
<body>
  <nav>
    <a href="../../" data-i18n="nav.back">← Back</a>
    <button class="theme-btn" onclick="openHelp()">?</button>
    <button class="lang-btn" onclick="toggleLang()">עב</button>
    <button class="theme-btn" onclick="toggleTheme()">Light</button>
  </nav>
  <h1 data-i18n="game.coin-flip">Coin Flip</h1>
  <canvas id="canvas" width="220" height="220"></canvas>
  <div id="status"></div>
  <div class="controls">
    <button id="btn-flip" data-i18n="btn.flip">Flip</button>
    <button id="btn-theme">Liberty</button>
  </div>
  <div id="tally">
    <span><strong id="heads-count">0</strong><span id="heads-label">HEADS</span></span>
    <span><strong id="tails-count">0</strong><span id="tails-label">TAILS</span></span>
  </div>
  <p class="hint" data-i18n="hint.coin-flip">Press Flip or tap the coin</p>
  <div id="help-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeHelp()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeHelp()">×</button>
      <div class="modal-title"><span data-i18n="help.how_to_play">How to Play</span> — <span data-i18n="game.coin-flip">Coin Flip</span></div>
      <ol class="modal-steps">
        <li data-i18n-html="help.coin.1">Press <strong>Flip</strong> or tap the coin to flip it.</li>
        <li data-i18n-html="help.coin.2">The coin lands on <strong>Heads or Tails</strong>.</li>
        <li data-i18n-html="help.coin.3">The <strong>tally</strong> counts heads and tails across all your flips.</li>
      </ol>
    </div>
  </div>
  <script src="../../confetti.js"></script>
  <script>
  function openHelp(){document.getElementById('help-modal').style.display='flex';}
  function closeHelp(){document.getElementById('help-modal').style.display='none';}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeHelp();});
  </script>
  <script src="../../rating.js"></script>
  <script src="game.js"></script>
</body>
</html>
