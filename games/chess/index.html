<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chess — Maimon's Games</title>
  <script src="../../i18n.js"></script>
  <script src="../../theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f0f13; --surface:#1a1a24; --border:#2a2a38; --accent:#7c6ff7; --text:#e8e8f0; --muted:#7a7a96; }
    [data-theme="light"] { --bg:#f4f4f8; --surface:#ffffff; --border:#dddde8; --accent:#5b4fd4; --text:#1a1a2e; --muted:#6a6a86; }
    body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif;
      display:flex; flex-direction:column; align-items:center; min-height:100dvh;
      padding:1rem; gap:0.75rem; touch-action:none; transition:background 0.2s,color 0.2s; }
    nav { align-self:center; display:flex; gap:1rem; align-items:center; justify-content:center; flex-wrap:wrap; }
    nav a { color:var(--muted); text-decoration:none; font-size:0.9rem; }
    nav a:hover { color:var(--text); }
    h1 { font-size:1.2rem; font-weight:600; }
    button { background:var(--surface); color:var(--text); border:1px solid var(--border);
      border-radius:8px; padding:0.5rem 1.2rem; font-size:0.9rem; cursor:pointer;
      -webkit-tap-highlight-color:transparent; }
    button:hover { border-color:var(--accent); }
    button:active { opacity:0.8; }
    .theme-btn, .lang-btn { color:var(--muted); padding:0.35rem 0.9rem; font-size:0.8rem; }
    .controls { display:flex; gap:0.6rem; flex-wrap:wrap; justify-content:center; }
    #btn-invite { border-color:var(--accent); color:var(--accent); font-weight:600; }
    #status { font-size:0.9rem; color:var(--muted); min-height:1.2em; text-align:center; }
    #status.win { color:#52e07c; font-weight:700; font-size:1rem; }
    .room-row { font-size:0.8rem; color:var(--muted); display:flex; gap:0.75rem; }
    .room-row span { color:var(--text); font-weight:600; font-family:monospace; letter-spacing:.08em; }
    #color-label { color:var(--accent); }
    #canvas { border-radius:4px; display:block; cursor:pointer; touch-action:none; }
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;max-width:360px;width:100%;position:relative;max-height:90vh;overflow-y:auto;}
    .modal-close{position:absolute;top:.75rem;right:.75rem;background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;line-height:1;padding:0;}
    .modal-close:hover{color:var(--text);}
    .modal-title{font-size:1.05rem;font-weight:700;margin-bottom:1rem;}
    .modal-steps{padding-inline-start:1.2rem;display:flex;flex-direction:column;gap:.65rem;font-size:.88rem;line-height:1.5;}
    canvas { max-width: 100%; height: auto; }

    @media (max-width: 720px) {
      body { padding: 0.85rem; gap: 0.7rem; }
      nav { gap: 0.55rem; }
      nav a, button, select, input { font-size: 0.85rem; }
      h1 { text-align: center; }
      .controls, .scores, .stats, .players, .setup, .room-row { justify-content: center; gap: 0.6rem; flex-wrap: wrap; text-align: center; }
      .panel { width: min(100%, 560px); padding: 0.9rem; }
      #board { width: min(100%, 520px); }
    }

  </style>
</head>
<body>
  <nav>
    <a href="../../">← Back</a>
    <button class="theme-btn" onclick="openHelp()">?</button>
    <button class="lang-btn" onclick="toggleLang()">עב</button>
    <button class="theme-btn" onclick="toggleTheme()">Light</button>
  </nav>
  <h1>Chess</h1>
  <div class="room-row">Room: <span id="room-id">—</span> <span id="color-label"></span></div>
  <canvas id="canvas" width="480" height="480"></canvas>
  <div id="status"></div>
  <div class="controls">
    <button id="btn-new">New Game</button>
    <button id="btn-invite">Invite Friend</button>
  </div>
  <div id="help-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeHelp()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeHelp()">×</button>
      <div class="modal-title"><span data-i18n="help.how_to_play">How to Play</span> — <span data-i18n="game.chess">Chess</span></div>
      <ol class="modal-steps">
        <li data-i18n-html="help.chess.1">Click a piece to select it, then click a highlighted square to move.</li>
        <li data-i18n-html="help.chess.2">Each piece moves in its own pattern. Protect your king while attacking the opponent's.</li>
        <li data-i18n-html="help.chess.3">Win by putting the enemy king in <strong>checkmate</strong>. Use <strong>Invite Friend</strong> for online play.</li>
      </ol>
    </div>
  </div>
  <script src="../../confetti.js"></script>
  <script src="../../multiplayer.js"></script>
  <script>
    function openHelp(){document.getElementById('help-modal').style.display='flex';}
    function closeHelp(){document.getElementById('help-modal').style.display='none';}
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeHelp();});
  </script>
  <script src="../../rating.js"></script>
  <script src="game.js"></script>
</body>
</html>
