<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>15 Puzzle — Maimon's Games</title>
  <script src="../../theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f0f13;--surface:#1a1a24;--border:#2a2a38;--accent:#7c6ff7;--text:#e8e8f0;--muted:#7a7a96; }
    [data-theme="light"] { --bg:#f4f4f8;--surface:#ffffff;--border:#dddde8;--accent:#5b4fd4;--text:#1a1a2e;--muted:#6a6a86; }
    body { background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100dvh;padding:1rem;gap:1rem;transition:background .2s,color .2s; }
    nav { align-self:flex-start;display:flex;gap:1rem;align-items:center; }
    nav a { color:var(--muted);text-decoration:none;font-size:.9rem; }
    nav a:hover { color:var(--text); }
    h1 { font-size:1.2rem;font-weight:600; }
    #canvas { border-radius:12px;max-width:100%;cursor:pointer;-webkit-tap-highlight-color:transparent; }
    .hud { display:flex;gap:1.5rem;font-size:.9rem;color:var(--muted); }
    .hud strong { color:var(--text); }
    .controls { display:flex;gap:.75rem; }
    button { background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.5rem 1.2rem;font-size:.9rem;cursor:pointer; }
    button:hover { border-color:var(--accent); }
    #status { color:var(--muted);font-size:.85rem;min-height:1.2em;text-align:center; }
    #status.win { color:var(--accent);font-weight:600; }
    .hint { color:var(--muted);font-size:.75rem;text-align:center; }
    .theme-btn { background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:.35rem .9rem;font-size:.8rem;cursor:pointer; }
    .theme-btn:hover { color:var(--text);border-color:var(--accent); }
  </style>
</head>
<body>
  <nav>
    <a href="../../">← Back</a>
    <button class="theme-btn" onclick="toggleTheme()">Light</button>
  </nav>
  <h1>15 Puzzle</h1>
  <div class="hud">
    <div>Moves: <strong id="moves">0</strong></div>
    <div>Time: <strong id="timer">0</strong>s</div>
  </div>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <button id="btn-new">New Game</button>
  </div>
  <div id="status"></div>
  <p class="hint">Tap a tile adjacent to the gap · Arrow keys also work</p>
  <script src="game.js"></script>
</body>
</html>
