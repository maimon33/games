<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048 — Maimon's Games</title>
  <script src="../../i18n.js"></script>
  <script src="../../theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2a2a38;
      --accent: #7c6ff7; --text: #e8e8f0; --muted: #7a7a96;
    }
    [data-theme="light"] {
      --bg: #f4f4f8; --surface: #ffffff; --border: #dddde8;
      --accent: #5b4fd4; --text: #1a1a2e; --muted: #6a6a86;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100dvh; padding: 1rem; gap: 1rem;
      transition: background 0.2s, color 0.2s;
    }

    nav { align-self: center; display: flex; gap: 1rem; align-items: center; justify-content: center; flex-wrap: wrap; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: var(--text); }

    .top-row {
      display: flex; align-items: center; gap: 1.5rem;
      width: min(95vw, 400px); justify-content: space-between;
    }

    h1 { font-size: 1.5rem; font-weight: 700; }

    .scores { display: flex; gap: 0.75rem; }
    .score-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 0.3rem 0.8rem; text-align: center;
      font-size: 0.75rem;
    }
    .score-box .val { font-size: 1rem; font-weight: 700; color: var(--accent); }

    #canvas { border-radius: 12px; max-width: 100%; touch-action: none; }

    .controls { display: flex; gap: 0.75rem; }
    button {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0.5rem 1.2rem; font-size: 0.9rem; cursor: pointer;
    }
    button:hover { border-color: var(--accent); }

    #status { color: var(--muted); font-size: 0.9rem; min-height: 1.2em; text-align: center; font-weight: 600; }
    #status.win { color: var(--accent); }
    #status.lose { color: #ef4444; }

    .hint { color: var(--muted); font-size: 0.75rem; text-align: center; }

    .theme-btn, .lang-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); padding: 0.35rem 0.9rem;
      font-size: 0.8rem; cursor: pointer;
    }
    .theme-btn:hover, .lang-btn:hover { color: var(--text); border-color: var(--accent); }
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;max-width:360px;width:100%;position:relative;max-height:90vh;overflow-y:auto;}
    .modal-close{position:absolute;top:.75rem;right:.75rem;background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;line-height:1;padding:0;}
    .modal-close:hover{color:var(--text);}
    .modal-title{font-size:1.05rem;font-weight:700;margin-bottom:1rem;}
    .modal-steps{padding-inline-start:1.2rem;display:flex;flex-direction:column;gap:.65rem;font-size:.88rem;line-height:1.5;}
    canvas { max-width: 100%; height: auto; }

    @media (max-width: 720px) {
      body { padding: 0.85rem; gap: 0.7rem; }
      nav { gap: 0.55rem; }
      nav a, button, select, input { font-size: 0.85rem; }
      h1 { text-align: center; }
      .controls, .scores, .stats, .players, .setup, .room-row { justify-content: center; gap: 0.6rem; flex-wrap: wrap; text-align: center; }
      .panel { width: min(100%, 560px); padding: 0.9rem; }
      #board { width: min(100%, 520px); }
    }

  </style>
</head>
<body>
  <nav>
    <a href="../../" data-i18n="nav.back">← Back</a>
    <button class="theme-btn" onclick="openHelp()">?</button>
    <button class="lang-btn" onclick="toggleLang()">עב</button>
    <button class="theme-btn" onclick="toggleTheme()">Light</button>
  </nav>
  <div class="top-row">
    <h1 data-i18n="game.2048">2048</h1>
    <div class="scores">
      <div class="score-box">Score<div class="val" id="score">0</div></div>
      <div class="score-box">Best<div class="val" id="best">0</div></div>
    </div>
  </div>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <button id="btn-new" data-i18n="btn.new_game">New Game</button>
  </div>
  <div id="status"></div>
  <p class="hint" data-i18n="hint.2048">Arrow keys or swipe to slide</p>
  <div id="help-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeHelp()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeHelp()">×</button>
      <div class="modal-title"><span data-i18n="help.how_to_play">How to Play</span> — <span data-i18n="game.2048">2048</span></div>
      <ol class="modal-steps">
        <li data-i18n-html="help.2048.1">Use <strong>arrow keys</strong> or <strong>swipe</strong> to slide all tiles in one direction.</li>
        <li data-i18n-html="help.2048.2">When two tiles with the <strong>same number</strong> collide, they merge and double.</li>
        <li data-i18n-html="help.2048.3">Keep merging until you reach the <strong>2048</strong> tile to win!</li>
      </ol>
    </div>
  </div>
  <script src="../../confetti.js"></script>
  <script>
  function openHelp(){document.getElementById('help-modal').style.display='flex';}
  function closeHelp(){document.getElementById('help-modal').style.display='none';}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeHelp();});
  </script>
  <script src="../../rating.js"></script>
  <script src="game.js"></script>
</body>
</html>
