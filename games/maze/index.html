<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Maze — Maimon's Games</title>
  <script src="../../i18n.js"></script>
  <script src="../../theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100dvh;
      padding: 1rem;
      gap: 1rem;
      touch-action: none;
      transition: background 0.2s, color 0.2s;
    }

    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2a2a38;
      --accent: #7c6ff7; --text: #e8e8f0; --muted: #7a7a96;
    }
    [data-theme="light"] {
      --bg: #f4f4f8; --surface: #ffffff; --border: #dddde8;
      --accent: #5b4fd4; --text: #1a1a2e; --muted: #6a6a86;
    }

    nav { align-self: center; display: flex; gap: 1rem; align-items: center; justify-content: center; flex-wrap: wrap; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: var(--text); }

    h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: -0.01em; }
    #canvas { border-radius: 8px; max-width: 100%; touch-action: none; }

    .controls { display: flex; gap: 0.75rem; align-items: center; }

    button {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:hover { border-color: var(--accent); }
    button:active { opacity: 0.8; }

    #status { color: var(--muted); font-size: 0.85rem; min-height: 1.2em; text-align: center; }
    #status.win { color: var(--accent); font-weight: 600; }
    .hint { color: var(--muted); font-size: 0.75rem; text-align: center; }

    .theme-btn, .lang-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); padding: 0.35rem 0.9rem;
      font-size: 0.8rem; cursor: pointer;
    }
    .theme-btn:hover, .lang-btn:hover { color: var(--text); border-color: var(--accent); }
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;max-width:360px;width:100%;position:relative;max-height:90vh;overflow-y:auto;}
    .modal-close{position:absolute;top:.75rem;right:.75rem;background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;line-height:1;padding:0;}
    .modal-close:hover{color:var(--text);}
    .modal-title{font-size:1.05rem;font-weight:700;margin-bottom:1rem;}
    .modal-steps{padding-inline-start:1.2rem;display:flex;flex-direction:column;gap:.65rem;font-size:.88rem;line-height:1.5;}
    .help-anim{width:100%;border-radius:8px;background:var(--bg);display:block;margin-bottom:1rem;}
  </style>
</head>
<body>
  <nav>
    <a href="../../" data-i18n="nav.back">← Back</a>
    <button class="theme-btn" onclick="openHelp()">?</button>
    <button class="lang-btn" onclick="toggleLang()">עב</button>
    <button class="theme-btn" onclick="toggleTheme()">Light</button>
  </nav>
  <h1 data-i18n="game.maze">Maze</h1>
  <canvas id="canvas"></canvas>
  <div class="controls">
    <button id="btn-new" data-i18n="btn.new_maze">New Maze</button>
    <button id="btn-size">Size: Medium</button>
  </div>
  <div id="status"></div>
  <p class="hint" data-i18n="hint.maze">Arrow keys or swipe to move</p>
  <div id="help-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeHelp()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeHelp()">×</button>
      <div class="modal-title"><span data-i18n="help.how_to_play">How to Play</span> — <span data-i18n="game.maze">Maze</span></div>
      <canvas id="help-anim" class="help-anim" width="280" height="110"></canvas>
      <ol class="modal-steps">
        <li data-i18n-html="help.maze.1">You start at the <strong>green</strong> cell. Find your way to the <strong>red</strong> exit.</li>
        <li data-i18n-html="help.maze.2">Use <strong>arrow keys</strong> or <strong>swipe</strong> to move through corridors.</li>
        <li data-i18n-html="help.maze.3">Reach the exit to win. Pick a bigger size for more challenge!</li>
      </ol>
    </div>
  </div>
  <script src="../../confetti.js"></script>
  <script>
  function openHelp(){document.getElementById('help-modal').style.display='flex';_startMazeAnim();}
  function closeHelp(){document.getElementById('help-modal').style.display='none';if(_hr){cancelAnimationFrame(_hr);_hr=null;}}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeHelp();});
  let _hr=null;
  function _startMazeAnim(){
    const c=document.getElementById('help-anim');if(!c)return;
    const ctx=c.getContext('2d'),W=c.width,H=c.height;
    const COLS=7,ROWS=4,CW=W/COLS,CH=H/ROWS;
    const hWalls=[[0,1,4],[1,2,5],[2,0,3],[3,4,7]];
    const vWalls=[[1,0,3],[3,1,4],[5,0,3],[2,2,4]];
    const path=[{r:0,c:0},{r:1,c:0},{r:2,c:0},{r:2,c:1},{r:2,c:2},{r:1,c:2},{r:1,c:3},{r:1,c:4},{r:0,c:4},{r:0,c:5},{r:0,c:6},{r:1,c:6},{r:2,c:6},{r:3,c:6}];
    let t=0;
    function frame(){
      ctx.fillStyle='#1a1a24';ctx.fillRect(0,0,W,H);
      ctx.strokeStyle='#7c6ff7';ctx.lineWidth=1.5;
      ctx.strokeRect(0,0,W,H);
      hWalls.forEach(([r,c1,c2])=>{ctx.beginPath();ctx.moveTo(c1*CW,r*CH);ctx.lineTo(c2*CW,r*CH);ctx.stroke();});
      vWalls.forEach(([c,r1,r2])=>{ctx.beginPath();ctx.moveTo(c*CW,r1*CH);ctx.lineTo(c*CW,r2*CH);ctx.stroke();});
      ctx.fillStyle='#52e07c44';ctx.fillRect(0,0,CW,CH);
      ctx.fillStyle='#e0525244';ctx.fillRect((COLS-1)*CW,(ROWS-1)*CH,CW,CH);
      const fi=Math.floor(t/18)%path.length,sub=(t%18)/18;
      const cur=path[fi],nxt=path[(fi+1)%path.length];
      const px=(cur.c+(nxt.c-cur.c)*sub)*CW+CW/2,py=(cur.r+(nxt.r-cur.r)*sub)*CH+CH/2;
      ctx.fillStyle='#7c6ff7';ctx.beginPath();ctx.arc(px,py,CW*0.28,0,Math.PI*2);ctx.fill();
      t++;_hr=requestAnimationFrame(frame);
    }
    if(_hr)cancelAnimationFrame(_hr);_hr=requestAnimationFrame(frame);
  }
  </script>
  <script src="../../rating.js"></script>
  <script src="game.js"></script>
</body>
</html>
