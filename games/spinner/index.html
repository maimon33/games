<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spinner — Maimon's Games</title>
  <script src="../../i18n.js"></script>
  <script src="../../theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f0f13; --surface:#1a1a24; --border:#2a2a38; --accent:#7c6ff7; --text:#e8e8f0; --muted:#7a7a96; }
    [data-theme="light"] { --bg:#f4f4f8; --surface:#ffffff; --border:#dddde8; --accent:#5b4fd4; --text:#1a1a2e; --muted:#6a6a86; }
    body { background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,sans-serif;
      display:flex; flex-direction:column; align-items:center; min-height:100dvh;
      padding:1rem; gap:1rem; transition:background 0.2s,color 0.2s; }
    nav { align-self:flex-start; display:flex; gap:1rem; align-items:center; }
    nav a { color:var(--muted); text-decoration:none; font-size:0.9rem; }
    nav a:hover { color:var(--text); }
    h1 { font-size:1.2rem; font-weight:600; }
    .controls { display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap; justify-content:center; }
    button { background:var(--surface); color:var(--text); border:1px solid var(--border);
      border-radius:8px; padding:0.5rem 1.2rem; font-size:0.9rem; cursor:pointer;
      -webkit-tap-highlight-color:transparent; }
    button:hover { border-color:var(--accent); }
    button:active { opacity:0.8; }
    .theme-btn, .lang-btn { color:var(--muted); padding:0.35rem 0.9rem; font-size:0.8rem; }
    #status { color:var(--accent); font-size:1rem; font-weight:700; min-height:1.4em; text-align:center; }
    .hint { color:var(--muted); font-size:0.75rem; text-align:center; }
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;max-width:360px;width:100%;position:relative;max-height:90vh;overflow-y:auto;}
    .modal-close{position:absolute;top:.75rem;right:.75rem;background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;line-height:1;padding:0;}
    .modal-close:hover{color:var(--text);}
    .modal-title{font-size:1.05rem;font-weight:700;margin-bottom:1rem;}
    .modal-steps{padding-inline-start:1.2rem;display:flex;flex-direction:column;gap:.65rem;font-size:.88rem;line-height:1.5;}

    #canvas { max-width:100%; cursor:pointer; }
    .add-row {
      display: flex; gap: 0.5rem; width: min(360px, calc(100vw - 2rem));
    }
    #option-input {
      flex: 1; background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0.5rem 1rem; font-size: 0.9rem; outline: none;
    }
    #option-input:focus { border-color: var(--accent); }
    #option-list {
      list-style: none; display: flex; flex-wrap: wrap; gap: 0.4rem;
      justify-content: center; max-width: min(360px, calc(100vw - 2rem));
    }
    #option-list li {
      display: flex; align-items: center; gap: 0.3rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 0.25rem 0.6rem 0.25rem 0.9rem;
      font-size: 0.82rem;
    }
    #option-list li button {
      background: none; border: none; color: var(--muted);
      padding: 0; font-size: 0.9rem; cursor: pointer; line-height: 1;
      border-radius: 50%; width: 1.2rem; height: 1.2rem;
    }
    #option-list li button:hover { color: #e05252; border-color: transparent; }
  </style>
</head>
<body>
  <nav>
    <a href="../../" data-i18n="nav.back">← Back</a>
    <button class="theme-btn" onclick="openHelp()">?</button>
    <button class="lang-btn" onclick="toggleLang()">עב</button>
    <button class="theme-btn" onclick="toggleTheme()">Light</button>
  </nav>
  <h1 data-i18n="game.spinner">Spinner</h1>
  <canvas id="canvas"></canvas>
  <div id="status"></div>
  <div class="controls">
    <button id="btn-spin" data-i18n="btn.spin">Spin</button>
  </div>
  <div class="add-row">
    <input id="option-input" type="text" maxlength="24" placeholder="Add option…">
    <button id="btn-add" data-i18n="btn.add">Add</button>
  </div>
  <ul id="option-list"></ul>
  <p class="hint" data-i18n="hint.spinner">Add options then press Spin</p>
  <div id="help-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeHelp()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeHelp()">×</button>
      <div class="modal-title"><span data-i18n="help.how_to_play">How to Play</span> — <span data-i18n="game.spinner">Spinner</span></div>
      <ol class="modal-steps">
        <li data-i18n-html="help.spinner.1">Type an option and press <strong>Add</strong> to add it to the wheel.</li>
        <li data-i18n-html="help.spinner.2">Press <strong>Spin</strong> to rotate the wheel. It slows down and lands on a result.</li>
        <li data-i18n-html="help.spinner.3">Remove options with the <strong>✕</strong> button. Minimum 2 options needed.</li>
      </ol>
    </div>
  </div>
  <script src="../../confetti.js"></script>
  <script>
  function openHelp(){document.getElementById('help-modal').style.display='flex';}
  function closeHelp(){document.getElementById('help-modal').style.display='none';}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeHelp();});
  </script>
  <script src="../../rating.js"></script>
  <script src="game.js"></script>
</body>
</html>
