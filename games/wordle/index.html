<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wordle — Maimon's Games</title>
  <script src="../../i18n.js"></script>
  <script src="../../theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0f0f13;--surface:#1a1a24;--border:#2a2a38;--accent:#7c6ff7;--text:#e8e8f0;--muted:#7a7a96; }
    [data-theme="light"] { --bg:#f4f4f8;--surface:#ffffff;--border:#dddde8;--accent:#5b4fd4;--text:#1a1a2e;--muted:#6a6a86; }
    body { background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100dvh;padding:1rem;gap:1rem;transition:background .2s,color .2s; }
    nav { align-self:center;display:flex;gap:1rem;align-items:center;justify-content:center;flex-wrap:wrap; }
    nav a { color:var(--muted);text-decoration:none;font-size:.9rem; }
    nav a:hover { color:var(--text); }
    h1 { font-size:1.3rem;font-weight:700; }

    #board {
      display:grid;
      grid-template-rows:repeat(6,1fr);
      gap:6px;
      width:min(95vw,330px);
    }
    .row { display:grid;grid-template-columns:repeat(5,1fr);gap:6px; }
    .tile {
      aspect-ratio:1;
      display:flex;align-items:center;justify-content:center;
      font-size:clamp(1.2rem,5vw,1.6rem);font-weight:700;
      border:2px solid var(--border);
      border-radius:4px;
      text-transform:uppercase;
      transition:background .1s,border-color .1s;
      user-select:none;
    }
    .tile.filled { border-color:var(--muted); }
    .tile.correct { background:#538d4e;border-color:#538d4e;color:#fff; }
    .tile.present { background:#b59f3b;border-color:#b59f3b;color:#fff; }
    .tile.absent  { background:#3a3a3c;border-color:#3a3a3c;color:#fff; }
    [data-theme="light"] .tile.absent { background:#787c7e;border-color:#787c7e; }

    #message { font-size:.9rem;font-weight:600;min-height:1.4em;text-align:center; }
    #message.win  { color:#538d4e; }
    #message.lose { color:#ef4444; }

    #keyboard { display:flex;flex-direction:column;gap:8px;width:min(95vw,500px); }
    .kb-row { display:flex;gap:6px;justify-content:center; }
    .key {
      height:clamp(42px,10vw,58px);
      min-width:clamp(28px,7vw,43px);
      padding:0 4px;
      background:var(--border);
      color:var(--text);
      border:none;border-radius:6px;
      font-size:clamp(.7rem,2.5vw,.9rem);font-weight:700;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;
      transition:background .1s;
      text-transform:uppercase;
    }
    .key.wide { min-width:clamp(44px,11vw,65px);font-size:clamp(.6rem,2vw,.75rem); }
    .key.correct { background:#538d4e;color:#fff; }
    .key.present { background:#b59f3b;color:#fff; }
    .key.absent  { background:#3a3a3c;color:#888; }
    [data-theme="light"] .key { background:#d3d6da;color:#1a1a2e; }
    [data-theme="light"] .key.absent { background:#787c7e;color:#f4f4f8; }

    .controls { display:flex;gap:.75rem; }
    button.action { background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:.5rem 1.2rem;font-size:.9rem;cursor:pointer; }
    button.action:hover { border-color:var(--accent); }

    .theme-btn, .lang-btn { background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:.35rem .9rem;font-size:.8rem;cursor:pointer; }
    .theme-btn { margin-left:auto; }
    .theme-btn:hover, .lang-btn:hover { color:var(--text);border-color:var(--accent); }
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;max-width:360px;width:100%;position:relative;max-height:90vh;overflow-y:auto;}
    .modal-close{position:absolute;top:.75rem;right:.75rem;background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;line-height:1;padding:0;}
    .modal-close:hover{color:var(--text);}
    .modal-title{font-size:1.05rem;font-weight:700;margin-bottom:1rem;}
    .modal-steps{padding-inline-start:1.2rem;display:flex;flex-direction:column;gap:.65rem;font-size:.88rem;line-height:1.5;}
    canvas { max-width: 100%; height: auto; }

    @media (max-width: 720px) {
      body { padding: 0.85rem; gap: 0.7rem; }
      nav { gap: 0.55rem; }
      nav a, button, select, input { font-size: 0.85rem; }
      h1 { text-align: center; }
      .controls, .scores, .stats, .players, .setup, .room-row { justify-content: center; gap: 0.6rem; flex-wrap: wrap; text-align: center; }
      .panel { width: min(100%, 560px); padding: 0.9rem; }
      #board { width: min(100%, 520px); }
    }

  </style>
</head>
<body>
  <nav>
    <a href="../../" data-i18n="nav.back">← Back</a>
    <h1 data-i18n="game.wordle">Wordle</h1>
    <button class="theme-btn" onclick="openHelp()">?</button>
    <button class="lang-btn" onclick="toggleLang()">עב</button>
    <button class="theme-btn" onclick="toggleTheme()">Light</button>
  </nav>
  <div id="board"></div>
  <div id="message"></div>
  <div id="keyboard"></div>
  <div class="controls">
    <button class="action" id="btn-new" data-i18n="btn.new_word">New Word</button>
  </div>
  <div id="help-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeHelp()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeHelp()">×</button>
      <div class="modal-title"><span data-i18n="help.how_to_play">How to Play</span> — <span data-i18n="game.wordle">Wordle</span></div>
      <ol class="modal-steps">
        <li data-i18n-html="help.wordle.1">Type any <strong>5-letter word</strong> and press Enter to guess.</li>
        <li data-i18n-html="help.wordle.2">🟩 <strong>Green</strong> = right letter, right place. 🟨 <strong>Yellow</strong> = right letter, wrong place. ⬛ Gray = not in the word.</li>
        <li data-i18n-html="help.wordle.3">You have <strong>6 guesses</strong>. Use the color hints to narrow it down!</li>
      </ol>
    </div>
  </div>
  <script src="../../confetti.js"></script>
  <script>
  function openHelp(){document.getElementById('help-modal').style.display='flex';}
  function closeHelp(){document.getElementById('help-modal').style.display='none';}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeHelp();});
  </script>
  <script src="words.js"></script>
  <script src="../../rating.js"></script>
  <script src="game.js"></script>
</body>
</html>
