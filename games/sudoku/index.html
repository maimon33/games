<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sudoku — Maimon's Games</title>
  <script src="../../i18n.js"></script>
  <script src="../../theme.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13; --surface: #1a1a24; --border: #2a2a38;
      --accent: #7c6ff7; --text: #e8e8f0; --muted: #7a7a96;
    }
    [data-theme="light"] {
      --bg: #f4f4f8; --surface: #ffffff; --border: #dddde8;
      --accent: #5b4fd4; --text: #1a1a2e; --muted: #6a6a86;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      display: flex; flex-direction: column; align-items: center;
      min-height: 100dvh; padding: 1rem; gap: 1rem;
      transition: background 0.2s, color 0.2s;
    }

    nav { align-self: flex-start; display: flex; gap: 1rem; align-items: center; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: var(--text); }

    h1 { font-size: 1.2rem; font-weight: 600; }

    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      width: min(95vw, 380px);
      border: 2px solid var(--text);
      border-radius: 4px;
      overflow: hidden;
    }

    .cell {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      font-size: clamp(0.9rem, 3.5vw, 1.2rem);
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      background: var(--surface);
      transition: background 0.1s;
      position: relative;
    }

    .cell.given { font-weight: 700; color: var(--text); cursor: default; }
    .cell.user-input { color: var(--accent); }
    .cell.selected { background: color-mix(in srgb, var(--accent) 25%, var(--surface)); }
    .cell.peer { background: color-mix(in srgb, var(--accent) 8%, var(--surface)); }
    .cell.error { color: #ef4444 !important; }

    .cell.box-left  { border-left: 2px solid var(--text); }
    .cell.box-top   { border-top: 2px solid var(--text); }

    .numpad {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.4rem;
      width: min(95vw, 380px);
    }

    .numpad button {
      aspect-ratio: 1;
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: 600;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .numpad button:hover { border-color: var(--accent); }
    .numpad button:active { opacity: 0.7; }
    .numpad button.erase { font-size: 1rem; color: var(--muted); }
    .numpad button:disabled, .numpad button.done { opacity: 0.22; cursor: default; pointer-events: none; }

    .controls { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }

    button.action {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0.5rem 1.2rem; font-size: 0.9rem; cursor: pointer;
    }
    button.action:hover { border-color: var(--accent); }

    #status { color: var(--muted); font-size: 0.85rem; min-height: 1.2em; text-align: center; }
    #status.win { color: var(--accent); font-weight: 600; }
    #status.error-msg { color: #ef4444; }

    .theme-btn, .lang-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); padding: 0.35rem 0.9rem;
      font-size: 0.8rem; cursor: pointer;
    }
    .theme-btn:hover, .lang-btn:hover { color: var(--text); border-color: var(--accent); }
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;}
    .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:1.5rem;max-width:360px;width:100%;position:relative;max-height:90vh;overflow-y:auto;}
    .modal-close{position:absolute;top:.75rem;right:.75rem;background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;line-height:1;padding:0;}
    .modal-close:hover{color:var(--text);}
    .modal-title{font-size:1.05rem;font-weight:700;margin-bottom:1rem;}
    .modal-steps{padding-inline-start:1.2rem;display:flex;flex-direction:column;gap:.65rem;font-size:.88rem;line-height:1.5;}
  </style>
</head>
<body>
  <nav>
    <a href="../../" data-i18n="nav.back">← Back</a>
    <button class="theme-btn" onclick="openHelp()">?</button>
    <button class="lang-btn" onclick="toggleLang()">עב</button>
    <button class="theme-btn" onclick="toggleTheme()">Light</button>
  </nav>
  <h1 data-i18n="game.sudoku">Sudoku</h1>
  <div class="sudoku-grid" id="grid"></div>
  <div class="numpad" id="numpad"></div>
  <div class="controls">
    <button class="action" id="btn-new" data-i18n="btn.new_game">New Game</button>
    <button class="action" id="btn-diff">Easy</button>
    <button class="action" id="btn-check" data-i18n="btn.check">Check</button>
    <button class="action" id="btn-size" onclick="toggle6x6()">6×6</button>
  </div>
  <div id="status"></div>
  <div id="help-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeHelp()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeHelp()">×</button>
      <div class="modal-title"><span data-i18n="help.how_to_play">How to Play</span> — <span data-i18n="game.sudoku">Sudoku</span></div>
      <ol class="modal-steps">
        <li data-i18n-html="help.sudoku.1">Click any <strong>empty cell</strong> to select it.</li>
        <li data-i18n-html="help.sudoku.2">Press a <strong>number key 1–9</strong> to fill the cell. Press Delete or 0 to erase.</li>
        <li data-i18n-html="help.sudoku.3">Each <strong>row, column, and 3×3 box</strong> must contain every number from 1–9 exactly once.</li>
      </ol>
    </div>
  </div>
  <script src="../../confetti.js"></script>
  <script>
  function openHelp(){document.getElementById('help-modal').style.display='flex';}
  function closeHelp(){document.getElementById('help-modal').style.display='none';}
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeHelp();});
  </script>
  <script src="../../rating.js"></script>
  <script src="game.js"></script>
</body>
</html>
